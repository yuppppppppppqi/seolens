name: Daily E2E & Lighthouse

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  supabase-health:
    runs-on: ubuntu-latest
    steps:
      - name: Check Supabase is alive
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://vtehdhnsimevvknwetsp.supabase.co/rest/v1/" \
            -H "apikey: dummy")
          if [ "$status" = "000" ]; then
            echo "::error::Supabase project is PAUSED or unreachable (seolens)"
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d '{"text":"⚠️ Supabase PAUSED: seolens (seo-lens.site)\nhttps://supabase.com/dashboard/projects"}'
            exit 1
          fi
          echo "Supabase OK (HTTP $status)"

  e2e-production:
    needs: supabase-health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLAYWRIGHT_BASE_URL: https://seo-lens.site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run smoke tests
        run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    needs: supabase-health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @lhci/cli
      - name: Run Lighthouse
        run: |
          lhci autorun --collect.url=https://seo-lens.site \
            --collect.numberOfRuns=3 \
            --assert.assertions.categories:performance="error;minScore=0.7" \
            --assert.assertions.categories:accessibility="error;minScore=0.8" \
            --collect.settings.chromeFlags="--no-sandbox"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14

  notify:
    runs-on: ubuntu-latest
    needs: [e2e-production, lighthouse]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.e2e-production.result }}" == "success" && "${{ needs.lighthouse.result }}" == "success" ]]; then
            echo "message=✅ seolens Daily Check passed" >> "$GITHUB_OUTPUT"
          else
            echo "message=❌ seolens Daily Check 失敗 (e2e: ${{ needs.e2e-production.result }}, lighthouse: ${{ needs.lighthouse.result }})" >> "$GITHUB_OUTPUT"
          fi
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.status.outputs.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
